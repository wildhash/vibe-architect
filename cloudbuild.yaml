steps:
  - name: python:3.12-slim
    dir: agent
    entrypoint: python
    args:
      - -m
      - py_compile
      - agent.py
      - tools.py
      - state.py

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - ./agent/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/vibe-architect-agent:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/vibe-architect-agent:latest
      - ./agent

images:
  - gcr.io/$PROJECT_ID/vibe-architect-agent:$SHORT_SHA
  - gcr.io/$PROJECT_ID/vibe-architect-agent:latest
