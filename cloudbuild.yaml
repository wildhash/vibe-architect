steps:
  - name: python:3.12-slim
    dir: agent
    entrypoint: python
    args:
      - -c
      - |
        import pathlib
        import py_compile

        for p in pathlib.Path(".").rglob("*.py"):
            py_compile.compile(str(p), doraise=True)

  - name: gcr.io/cloud-builders/docker
    entrypoint: sh
    env:
      - BRANCH_NAME=$BRANCH_NAME
    args:
      - -c
      - |
        set -eu

        docker build \
          -f ./agent/Dockerfile \
          -t ${_IMAGE_URI}:$SHORT_SHA \
          ./agent

        docker push ${_IMAGE_URI}:$SHORT_SHA

        if [ "${_PUSH_LATEST}" = "true" ] || [ "${BRANCH_NAME}" = "main" ]; then
          docker tag ${_IMAGE_URI}:$SHORT_SHA ${_IMAGE_URI}:latest
          docker push ${_IMAGE_URI}:latest
        fi

substitutions:
  _IMAGE_URI: gcr.io/${PROJECT_ID}/vibe-architect-agent
  _PUSH_LATEST: "false"

options:
  dynamicSubstitutions: true
