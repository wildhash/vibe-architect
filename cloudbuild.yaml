steps:
  - name: python:3.12-slim
    dir: agent
    entrypoint: python
    args:
      - -m
      - py_compile
      - agent.py
      - tools.py
      - state.py

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - ./agent/Dockerfile
      - -t
      - ${_IMAGE_URI}:$SHORT_SHA
      - -t
      - ${_IMAGE_URI}:latest
      - ./agent

images:
  - ${_IMAGE_URI}:$SHORT_SHA
  - ${_IMAGE_URI}:latest

substitutions:
  _IMAGE_URI: gcr.io/${PROJECT_ID}/vibe-architect-agent

options:
  dynamicSubstitutions: true
