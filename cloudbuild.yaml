steps:
  - name: python:3.12-slim
    dir: agent
    entrypoint: python
    args:
      - -c
      - |
        import pathlib
        import py_compile

        for p in pathlib.Path(".").rglob("*.py"):
            py_compile.compile(str(p), doraise=True)

  - name: gcr.io/cloud-builders/docker
    entrypoint: sh
    args:
      - -c
      - |
        set -eu

        docker build \
          -f ./agent/Dockerfile \
          -t "${_IMAGE_URI}:$SHORT_SHA" \
          ./agent

        if [ "${_PUSH_LATEST}" = "true" ]; then
          docker tag "${_IMAGE_URI}:$SHORT_SHA" "${_IMAGE_URI}:latest"
          docker push "${_IMAGE_URI}:latest"
        fi

images:
  - ${_IMAGE_URI}:$SHORT_SHA
  # Note: :latest is pushed conditionally in the step above (not listed here).

substitutions:
  _IMAGE_URI: gcr.io/${PROJECT_ID}/vibe-architect-agent
  _PUSH_LATEST: "false"

options:
  automapSubstitutions: true
  dynamicSubstitutions: true
