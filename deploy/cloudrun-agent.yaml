# Cloud Run deployment — Vibe Architect Agent
# Deploy: gcloud run services replace deploy/cloudrun-agent.yaml --region us-central1

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: vibe-architect-agent
  annotations:
    run.googleapis.com/ingress: internal
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 10
      timeoutSeconds: 3600
      containers:
        - image: gcr.io/YOUR_PROJECT_ID/vibe-architect-agent:latest
          ports:
            - containerPort: 8080
          env:
            - name: LIVEKIT_URL
              valueFrom:
                secretKeyRef:
                  name: vibe-architect-secrets
                  key: LIVEKIT_URL
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vibe-architect-secrets
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: vibe-architect-secrets
                  key: LIVEKIT_API_SECRET
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "true"
            - name: GOOGLE_CLOUD_PROJECT
              value: "YOUR_PROJECT_ID"
            - name: GOOGLE_CLOUD_LOCATION
              value: "us-central1"
            - name: FIRESTORE_COLLECTION
              value: "vibe_sessions"
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
